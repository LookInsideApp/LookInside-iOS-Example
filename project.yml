name: LookInsideExample-iOS
options:
  bundleIdPrefix: app.lookinside.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGNING_REQUIRED: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
  configs:
    Debug:
      CODE_SIGN_IDENTITY[sdk=iphoneos*]: ""
      CODE_SIGNING_ALLOWED[sdk=iphoneos*]: NO
    Release:
      CODE_SIGN_IDENTITY[sdk=iphoneos*]: ""
      CODE_SIGNING_ALLOWED[sdk=iphoneos*]: NO

packages:
  LookInsideServer:
    path: ../LookInsideServer
  # Shim XCFramework that bolts SwiftUI debug support onto the LookInsideServer
  # already linked above. Local path keeps the monorepo self-contained; the
  # Shim's Package.swift transitively re-declares LookInsideServer, but
  # SwiftPM's local-path declaration above overrides the transitive remote so
  # both packages resolve to the same sibling.
  LookInsideExtra-Shim:
    path: ../LookInsideExtra-Shim

targets:
  LookInsideExample-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/LookInsideExampleApp
    info:
      path: Sources/LookInsideExampleApp/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleDisplayName: LookInside Example
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lookinside.example.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: LookInsideServer
        product: LookinServer
      - package: LookInsideExtra-Shim
        product: LookInsideExtraSwiftUserInterfaceSupport
